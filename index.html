	<script>

		}

		}

			if(this.state==="Empty" || this.content===undefined) {

					editingGrid.innerHTML+="<svg viewBox='0 0 100 100' class='apos in-svg' style='top: 0px; left: 0px; opacity: 0.5'><path class='black-path' d='M10 5L50 20L90 5'/></svg><span class='apos smid text4-c consolas' style='top: 6%; left: 50%; opacity: 0.5'>="+levelList[player.biomename][game.level].spawnset[i].set+"=</span>"
				}
			}

				for(let i=0;i<levelList[player.biomename][game.level].transportset.length;i++) if(levelList[player.biomename][game.level].transportset[i].end.x===this.x && levelList[player.biomename][game.level].transportset[i].end.y===this.y) {

		let selectedGrid=new Object()

		function getGrid(value,x,y) {
			return document.querySelector("[value='"+value+"'][data-x='"+x+"'][data-y='"+y+"']")
		}
		function mouseGridInfo() {
			let topLeft=getGrid(0,1,1).getBoundingClientRect()
			let mouseRow=betterFloor((mouseX-topLeft.left)/70)+1,mouseColumn=betterFloor((mouseY-topLeft.top)/70)+1
			if(mouseRow<1 || mouseRow>game.width || mouseColumn<1 || mouseColumn>game.height) {
				return
			}
			gridInfo(getGrid(0,mouseRow,mouseColumn))
		}
		function clickGrid(button) {
			if(animation) return
			if(!isVisible(document.getElementById("gridinfo")) && selectedGrid.select===false) return
			let buttonValue=parseInt(button.value),buttonX=parseInt(button.getAttribute("data-x")),buttonY=parseInt(button.getAttribute("data-y"))
			if(buttonValue===0) {
				if(selectedGrid.select===true && selectedGrid.value===0) {
					getGrid(0,selectedGrid.x,selectedGrid.y).style.opacity=1
					selectedGrid.select=false
					for(let i=1;i<=4;i++) if(selectedGrid.x+dx[i]===buttonX && selectedGrid.y+dy[i]===buttonY && validSwapCheck(selectedGrid.x,selectedGrid.y,i)) {
						exchange(selectedGrid.x,selectedGrid.y,i)
						return
					}
					gridInfo(button)
					return
				}
				closeGridInfo()
				selectedGrid.select=true
				selectedGrid.value=buttonValue
				selectedGrid.x=buttonX
				selectedGrid.y=buttonY
				button.style.opacity=0.5
			}
		}
		function dragGridStart(button) {
			if(animation) return
			if(!isVisible(document.getElementById("gridinfo"))) return
			if(selectedGrid.select===true) return
			let buttonValue=parseInt(button.value),buttonX=parseInt(button.getAttribute("data-x")),buttonY=parseInt(button.getAttribute("data-y"))
			if(buttonValue===0) {
				closeGridInfo()
				draggingGrid.drag=true
				draggingGrid.value=buttonValue
				draggingGrid.x=buttonX
				draggingGrid.y=buttonY
				document.addEventListener("mouseup",dragGridEnd)
			}
		}
		function dragGridEnd(mouseCord) {
			draggingGrid.drag=false
			document.removeEventListener("mouseup",dragGridEnd)
			let topLeft=getGrid(0,1,1).getBoundingClientRect()
			let mouseRow=betterFloor((mouseX-topLeft.left)/70)+1,mouseColumn=betterFloor((mouseY-topLeft.top)/70)+1
			if(mouseRow<1 || mouseRow>game.width || mouseColumn<1 || mouseColumn>game.height) {
				return
			}
			for(let i=1;i<=4;i++) if(draggingGrid.x+dx[i]===mouseRow && draggingGrid.y+dy[i]===mouseColumn && validSwapCheck(draggingGrid.x,draggingGrid.y,i)) {
				exchange(draggingGrid.x,draggingGrid.y,i)
				return
			}
			mouseGridInfo()
		}
		async function addTempMovingGrid(grid,startX,startY,endX,endY,period=200) {
			if(player.settings.skipanimation===true) return
			let startRect=getGrid(0,startX,startY).getBoundingClientRect()
			let endRect=getGrid(0,endX,endY).getBoundingClientRect()
			grid.style.position="absolute"
			grid.style.left=startRect.left+"px"
			grid.style.top=startRect.top+"px"
			grid.style.transform="translate(0px, 0px) scale(1)"
			grid.style.opacity=0.8
			grid.style.transition="transform "+(0.9*period)+"ms linear, opacity "+(0.9*period)+"ms linear"
			document.body.appendChild(grid)
			await delay(period/10)
			grid.style.transform="translate("+(endRect.left-startRect.left)+"px, "+(endRect.top-startRect.top)+"px) scale(0.5)"
			grid.style.opacity=0.5
			setTimeout(()=>{grid.remove()},0.9*period)
		}
	</script>
	<script>
		const bookHTML=new Object()
		bookHTML["Advanced Crafter Guide"]="<h2>Advanced Crafter Guide</h2><span>Are you confused about these special entities? This is a guide for them!</span><br><span>As you see, to fight against endless mobs, limited petals would not be enough. There are spawners which create new petals constantly. They have a mark on the top of specified grid. The symbol is \"=x=\". You can view the level info (in bottom right corner, <span class='bold'>also used to leave a biome</span>) to know what will they spawn.</span><br><span>As you see again, for a board with more void grid, you need transporters to transport petal. They also have a mark on the top of specified grid, with a symbol of \"x,y\". This is the coordinate of grid where it transport petals from.</span><br><span>There are also walls which prevents you exchange petals. Petals crushed nearby will deal a static 1 damage to the wall. If both side of the wall are petals and crushed together, <span class='bold'>the damage stacks</span>.</span>"
		bookHTML["Flower Game Guide"]="<h2>Flower Game Guide</h2><div class='white-bg inner-box'><span style='color: #008000'>#include&lt;PFLFtools.h&gt;</span><span><span style='font-weight: bold'>using namespace</span> std<span style='color: #ff0000; font-weight: bold'>;</span></span><span><span style='font-weight: bold'>int</span> main<span style='color: #ff0000; font-weight: bold'>()</span></span><span style='color: #ff0000; font-weight: bold'>{</span><span style='margin-left: 2em'>system<span style='color: #ff0000; font-weight: bold'>(</span><span style='color: #0000ff; font-weight: bold'>\"cls\"</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='margin-left: 2em'>slowprint<span style='color: #ff0000; font-weight: bold'>(</span><span style='color: #0000ff; font-weight: bold'>\"↓MORE GAME (CLICK!)↓\"</span><span style='color: #ff0000; font-weight: bold'>,</span><span style='color: #800080'>50</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='margin-left: 2em'>slowprint<span style='color: #ff0000; font-weight: bold'>(</span><a href='https://6triple6single.github.io/Florroom' target='_blank' style='color: #0000ff; font-weight: bold; text-decoration: none'>\"FLORROOM\"</a><span style='color: #ff0000; font-weight: bold'>,</span><span style='color: #800080'>50</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='margin-left: 2em'>slowprint<span style='color: #ff0000; font-weight: bold'>(</span><a href='https://6triple6single.github.io/PFLF' target='_blank' style='color: #0000ff; font-weight: bold; text-decoration: none'>\"PFLF\"</a><span style='color: #ff0000; font-weight: bold'>,</span><span style='color: #800080'>50</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='margin-left: 2em'>slowprint<span style='color: #ff0000; font-weight: bold'>(</span><a href='https://6triple6single.github.io/Virus1' target='_blank' style='color: #0000ff; font-weight: bold; text-decoration: none'>\"VIRUS 1\"</a><span style='color: #ff0000; font-weight: bold'>,</span><span style='color: #800080'>50</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='margin-left: 2em'><span style='font-weight: bold'>return</span> <span style='color: #800080'>0</span><span style='color: #ff0000; font-weight: bold'>;</span></span><span style='color: #ff0000; font-weight: bold'>}</span></div>"
		bookHTML["Petal Crafter Tutorial"]="<h2>Petal Crafter Tutorial</h2><span>You combined 3 petals into a line, then they crushed and crafted a new one! You have already seen how powerful it is. The Rock is instantly destroyed.</span><span>Maybe you will need to try something new. For example, crafting 4 or more petals, combining petals with different rarity... Anyway, this is a great starting, go on!</span><br><span>Oh, you are confused about how does damage work? Well, when you combine damaging petals together, all of them will do damage to a certain mob nearby (if exist). Then, each petal does damage to mobs around it. So actually <span class='bold'>you have dealt 30+10 damage to the Rock</span>! That's so powerful!</span><br><span>Oh, you also want to ask what is score? Score drops over turn. It determines how good your work is. Remember try to get as much score as you can.</span><br><span>Don't turn the [Resource] Log Display off in settings, you will be notified when you have new things to learn!</span>"
		bookHTML["Various Petal Collection"]="<h2>Various Petal Collection</h2><span>Craft a special petal with special type by your own!</span><br><span>The Row Type: It has an icon consisting of a horizontal line and two outward pointing arrows. It releases a blast when crushed. The blast will destroy all petals in the same row and also damage mobs.</span><span>The Column Type: It has an icon consisting of a vertical line and two outward pointing arrows. It also releases a blast when crushed. The blast affects things in the same column instead.</span><span>The Bomb Type: It has an icon with two diagonal lines and four outward pointing arrows on the corners. It also releases a blast when crushed. The blast affects things within <span class='bold'>sqrt(5)</span> distance instead.</span><span>The Kaleidoscope Type: It has a regular pentagon icon. When crushed, it collects petals of the same type instead of releasing blast. <span class='bold'>This will not destroy petals which destroys by blast</span>.</span><h3>How to get</h3><span>The Row Type: Combine 4 petals in a column. Only created if Bomb or Kaleidoscope type can't be created.</span><span>The Column Type: Combine 4 petals in a row. Same condition as above.</span><span>The Bomb Type: Creates whenever there is a cross (which means a petal is both crushed in row and column) but Kaleidoscope can not be created.</span><span>The Kaleidoscope Type: Combine 5 petals in a row or a column. Has the highest priority.</span><br><span>An area can only create one special type of petal. If there is only one rarity in an area, all petals will be combined into a higher rarity one, but it has the lowest priority. If there is no place to create, nothing will happen, AND this has nothing to do with energy loss.</span>"

		function encodeFile(savestr) {
			if(savestr.length%2>0) savestr+="79.76"
			let encodedstr=""
			for(let i=0;i<savestr.length/2;i++) {
				let encodeValue=(savestr[2*i].charCodeAt()-20)*130+(savestr[2*i+1].charCodeAt()-20)
				encodedstr+=String.fromCharCode(65+betterFloor(encodeValue/676))
				encodedstr+=String.fromCharCode(65+betterFloor(encodeValue/26)%26)
				encodedstr+=String.fromCharCode(65+encodeValue%26)
			}
			for(let i=0;i<encodedstr.length;i++) {
				encodedstr[i]=String.fromCharCode(65+(encodedstr[i].charCodeAt()-65+betterFloor((i+1)/(encodedstr.length+1)*354233654))%26)
			}
			return encodedstr
		}
		function decodeFile(encodedstr) {
			let savestr=""
			for(let i=0;i<encodedstr.length;i++) {
				encodedstr[i]=String.fromCharCode(65+(encodedstr[i].charCodeAt()-65-betterFloor((i+1)/(encodedstr.length+1)*354233654))%26)
			}
			for(let i=0;i<encodedstr.length/3;i++) {
				let encodeValue=(encodedstr[3*i].charCodeAt()-65)*676+(encodedstr[3*i+1].charCodeAt()-65)*26+(encodedstr[3*i+2].charCodeAt()-65)
				savestr+=String.fromCharCode(20+betterFloor(encodeValue/130))
				savestr+=String.fromCharCode(20+encodeValue%130)
			}
			if(savestr[savestr.length-1]==="6") savestr=savestr.slice(0,-5)
			return savestr
		}
		function importSave() {
			if(animation) return
			document.querySelectorAll("input[type='file']").forEach(input => input.remove())
			let fileInput=document.createElement("input")
			fileInput.type="file"
			fileInput.accept=".txt"
			fileInput.style.display="none"
			fileInput.addEventListener("change",function(e) {
				let savefile=e.target.files[0]
				if(!savefile) {
					document.body.removeChild(fileInput)
					return
				}
				let reader=new FileReader()
				reader.onload=async function(event) {
					try {
						savefile=JSON.parse(decodeFile(event.target.result))
						if(!savefile.player) throw new Error()
						clearAllInterval()
						player=savefile.player
						setPlayer()
						document.getElementById("end1").style["pointer-events"]="unset"
						for(let i=0;i<=10;i++) {
							document.getElementById("end1").style.opacity=i/10
							await delay(100)
						}
						location.reload()
					} catch {
						document.body.removeChild(fileInput)
						alert("Error: Memory incomplete")
					}
				}
				reader.readAsText(savefile)
			} )
			document.body.appendChild(fileInput)
			fileInput.click()
		}

		let drag=false,dragX=0,dragY=0,worldcX=0,worldcY=0,scaleSize
		function setContainElement() {
			let containerStyle=window.getComputedStyle(document.getElementById("world-container"))
			scaleSize=Math.min(parseFloat(containerStyle.height),parseFloat(containerStyle.width))
			document.getElementById("world-container").addEventListener("mousedown",function(mouse) {
				if(mouse.target.id!=="blank") return
				closeMapInfo()
				drag=true
				dragX=mouseX
				dragY=mouseY
			} )
			document.addEventListener("mousemove",function(mouse) {
				if(drag!==true) return
				scaleSize=Math.min(parseFloat(containerStyle.height),parseFloat(containerStyle.width))
				worldcX+=(mouseX-dragX)*100/scaleSize,dragX=mouseX
				worldcY+=(mouseY-dragY)*100/scaleSize,dragY=mouseY
				document.getElementById("world-trans").style.transform="translate("+worldcX+"px, "+worldcY+"px)"
				updateHome()
			} )
			document.addEventListener("mouseup",function() {
				drag=false
			} )
		}
		function updateHome() {
			let scaledX=worldcX/parseFloat(window.getComputedStyle(document.getElementById("world-container")).width)
			let scaledY=worldcY/parseFloat(window.getComputedStyle(document.getElementById("world-container")).height)
			let scaleDistance=Math.max(Math.abs(scaledX),Math.abs(scaledY))
			if(Math.abs(scaledX)*scaleSize<50 && Math.abs(scaledY)*scaleSize<50) {
				document.getElementById("house").style.display="none"
			} else {
				document.getElementById("house").style.left=50+scaledX/scaleDistance*40+"%"
				document.getElementById("house").style.top=50+scaledY/scaleDistance*40+"%"
				document.getElementById("house").style.display="unset"
			}
		}
		function home() {
			worldcX=0
			worldcY=0
			document.getElementById("world-trans").style.transform=""
			updateHome()
		}

					if(player.explore[mapList[i].name].highscore[j]>=levelList[mapList[i].name][j].goal) {

		function spawnPetalInitial(x,y) {
			let petalSpawner=levelList[player.biomename][game.level].spawner[0]
			let totalWeight=0
			for(let i=0;i<petalSpawner.length;i++) if(!petalSpawner[i].hasOwnProperty("noinitial")) totalWeight+=petalSpawner[i].weight
			let seed=roll(1,totalWeight)
			for(let i=0;i<petalSpawner.length;i++) if(!petalSpawner[i].hasOwnProperty("noinitial")) {
				seed-=petalSpawner[i].weight
				if(seed<=0) {
					let pendingSpawn=petalSpawner[i].result(x,y)
					pendingSpawn.newspawn=true
					return pendingSpawn
				}
			}
		}
		function spawnPetal(x,y,spawnSet) {
			let petalSpawner=levelList[player.biomename][game.level].spawner[spawnSet]
			let totalWeight=0
			for(let i=0;i<petalSpawner.length;i++) totalWeight+=petalSpawner[i].weight
			let seed=roll(1,totalWeight)
			for(let i=0;i<petalSpawner.length;i++) {
				seed-=petalSpawner[i].weight
				if(seed<=0) {
					let pendingSpawn=petalSpawner[i].result(x,y)
					pendingSpawn.newspawn=true
					return pendingSpawn
				}
			}
		}
		function initialSpawn() {
			for(let i=1;i<=game.width;i++) for(let j=1;j<=game.height;j++) if(game.board[i][j].content==="Uninitialized") {
				game.board[i][j]=spawnPetalInitial(i,j)
			}
			while(!adjustMap()) {
				for(let i=1;i<=game.width;i++) for(let j=1;j<=game.height;j++) if(game.board[i][j].newspawn===true) game.board[i][j]=spawnPetalInitial(i,j)
			}
			if(mapRearranged) {
				for(let i=1;i<=game.width;i++) for(let j=1;j<=game.height;j++) if(mapClone[i][j].state==="Rearranging") {
					game.board[i][j]=mapClone[i][j].clone()
					game.board[i][j].state="Existing"
				}
				mapRearranged=false
			}
			for(let i=1;i<=game.width;i++) for(let j=1;j<=game.height;j++) game.board[i][j].newspawn=false
		}
		function crushCheck(gridX,gridY,content) {
			let targetGrid=game.board[gridX][gridY].clone()
			if(content!==undefined) targetGrid.content=content
			if(targetGrid.state==="Empty" || !isPetal(targetGrid.content)) return false
			let rowSame=new Object()
			for(let i=-2;i<=2;i++) if(gridX+i>=1 && gridX+i<=game.width && game.board[gridX+i][gridY].state!=="Empty" && isPetal(game.board[gridX+i][gridY].content) && game.board[gridX+i][gridY].content.id===targetGrid.content.id) rowSame[i]=true
			if(rowSame[-2]===true && rowSame[-1]===true) return true
			if(rowSame[-1]===true && rowSame[1]===true) return true
			if(rowSame[1]===true && rowSame[2]===true) return true
			let columnSame=new Object()
			for(let i=-2;i<=2;i++) if(gridY+i>=1 && gridY+i<=game.height && game.board[gridX][gridY+i].state!=="Empty" && isPetal(game.board[gridX][gridY+i].content) && game.board[gridX][gridY+i].content.id===targetGrid.content.id) columnSame[i]=true
			if(columnSame[-2]===true && columnSame[-1]===true) return true
			if(columnSame[-1]===true && columnSame[1]===true) return true
			if(columnSame[1]===true && columnSame[2]===true) return true
			return false
		}
		function crushCheckGrid(grid1,grid2,grid3) {
			if(grid1.state==="Empty" || !isPetal(grid1.content)) return false
			if(grid2.state==="Empty" || !isPetal(grid2.content)) return false
			if(grid3.state==="Empty" || !isPetal(grid3.content)) return false
			if(grid1.content.id!==grid2.content.id) return false
			if(grid1.content.id!==grid3.content.id) return false
			return true
		}
		function validSwapCheck(gridX,gridY,dir) {
			if(gridX+dx[dir]<1 || gridX+dx[dir]>game.width || gridY+dy[dir]<1 || gridY+dy[dir]>game.height) return false
			if(game.wall[gridX][gridY][dir]>0) return false
			if(dir===4) return validSwapCheck(gridX-1,gridY,2)
			if(dir===1) return validSwapCheck(gridX,gridY-1,3)
			let targetGrid1=game.board[gridX][gridY],targetGrid2=game.board[gridX+dx[dir]][gridY+dy[dir]]
			if(targetGrid1.state==="Empty" || targetGrid1.content.attribute.move==="Disabled") return false
			if(targetGrid2.state==="Empty" || targetGrid2.content.attribute.move==="Disabled") return false
			if(dir===2) {
				if(isPetal(targetGrid1.content)) {
					let rowSame=new Object()
					for(let i=-2;i<=2;i++) if(gridX+1+i>=1 && gridX+1+i<=game.width && game.board[gridX+1+i][gridY].state!=="Empty" && isPetal(game.board[gridX+1+i][gridY].content) && game.board[gridX+1+i][gridY].content.id===targetGrid1.content.id) rowSame[i]=true
					rowSame[-1]=false
					if(rowSame[-2]===true && rowSame[-1]===true) return true

			for(let i=-2;i<=2;i++) if(crusher.y+i>=1 && crusher.y+i<=game.height && mapClone[crusher.x][crusher.y+i].state!=="Empty" && isPetal(mapClone[crusher.x][crusher.y+i].content) && mapClone[crusher.x][crusher.y+i].content.id===mapClone[fixer.x][fixer.y].content.id) columnSame[i]=true
			if(columnSame[-2]===true && columnSame[-1]===true) return false
			if(columnSame[-1]===true && columnSame[1]===true) return false
			if(columnSame[1]===true && columnSame[2]===true) return false
			rowSame=new Object()
			for(let i=-2;i<=2;i++) if(fixer.x+i>=1 && fixer.x+i<=game.width && mapClone[fixer.x+i][fixer.y].state!=="Empty" && isPetal(mapClone[fixer.x+i][fixer.y].content) && mapClone[fixer.x+i][fixer.y].content.id===mapClone[crusher.x][crusher.y].content.id) rowSame[i]=true
			if(rowSame[-2]===true && rowSame[-1]===true) return false
			if(rowSame[-1]===true && rowSame[1]===true) return false
			if(rowSame[1]===true && rowSame[2]===true) return false
			columnSame=new Object()
			for(let i=-2;i<=2;i++) if(fixer.y+i>=1 && fixer.y+i<=game.height && mapClone[fixer.x][fixer.y+i].state!=="Empty" && isPetal(mapClone[fixer.x][fixer.y+i].content) && mapClone[fixer.x][fixer.y+i].content.id===mapClone[crusher.x][crusher.y].content.id) columnSame[i]=true
			if(columnSame[-2]===true && columnSame[-1]===true) return false
			if(columnSame[-1]===true && columnSame[1]===true) return false
			if(columnSame[1]===true && columnSame[2]===true) return false
			return true
		}
		function adjustMap() {
			if(validMapCheck()) return true
			if(player.biomename==="Training Ground" && game.level<=4) return false
			let adjustList=new Array(),availablePetalNum=new Object(),availablePetal=new Array()
			mapClone=new Array()
			for(let i=1;i<=game.width;i++) {
				mapClone[i]=new Array()
				for(let j=1;j<=game.height;j++) mapClone[i][j]=game.board[i][j].clone()
			}
			for(let i=1;i<=game.width;i++) for(let j=1;j<=game.height;j++) if(mapClone[i][j].state==="Existing" && isPetal(mapClone[i][j].content) && mapClone[i][j].type==="Normal") {
				if(!availablePetalNum.hasOwnProperty(mapClone[i][j].content.id)) availablePetalNum[mapClone[i][j].content.id]=0
				availablePetalNum[mapClone[i][j].content.id]++
				mapClone[i][j].state="Rearranging"
				availablePetal.push(mapClone[i][j].clone())
			}
			for(let i=1;i<=game.width;i++) for(let j=1;j<=game.height-2;j++) {
				if(mapClone[i][j].state==="Empty") continue
				if(mapClone[i][j+1].state==="Empty") continue
				if(mapClone[i][j+2].state==="Empty") continue
				if(mapClone[i][j].content.attribute.move==="Disabled") continue
				if(mapClone[i][j+1].content.attribute.move==="Disabled") continue
				if(mapClone[i][j+2].content.attribute.move==="Disabled") continue
				for(let k in availablePetalNum) {
					for(let swapPlace=0;swapPlace<=2;swapPlace++) for(let swapDir=1;swapDir<=4;swapDir++) {
						let swapStart={x:i,y:j+swapPlace},swapEnd={x:i+dx[swapDir],y:j+swapPlace+dy[swapDir]},kId=parseInt(k)
						if(swapEnd.x<1 || swapEnd.x>game.width || swapEnd.y<1 || swapEnd.y>game.height) continue
						if(game.wall[i][j+swapPlace][swapDir]>0) continue
						if(swapEnd.x===i && swapEnd.y>=j && swapEnd.y<=j+2) continue
						if(swapPlace!==0 && mapClone[i][j].state!=="Rearranging" && (!isPetal(mapClone[i][j].content) || mapClone[i][j].content.id!==kId)) continue
						if(swapPlace!==1 && mapClone[i][j+1].state!=="Rearranging" && (!isPetal(mapClone[i][j+1].content) || mapClone[i][j+1].content.id!==kId)) continue
						if(swapPlace!==2 && mapClone[i][j+2].state!=="Rearranging" && (!isPetal(mapClone[i][j+2].content) || mapClone[i][j+2].content.id!==kId)) continue
						if(mapClone[swapEnd.x][swapEnd.y].state!=="Rearranging" && (!isPetal(mapClone[swapEnd.x][swapEnd.y].content) || mapClone[swapEnd.x][swapEnd.y].content.id!==kId)) continue
						if(mapClone[swapStart.x][swapStart.y].state!=="Rearranging" && mapClone[swapStart.x][swapStart.y].state!=="Existing") continue
						if(mapClone[swapEnd.x][swapEnd.y].state!=="Rearranging" && mapClone[swapEnd.x][swapEnd.y].state!=="Existing") continue
						if(mapClone[swapStart.x][swapStart.y].state==="Existing" && isPetal(mapClone[swapStart.x][swapStart.y].content) && mapClone[swapStart.x][swapStart.y].content.id===kId) continue
						let requiredAmount=3
						if(swapPlace!==0 && mapClone[i][j].state!=="Rearranging" && isPetal(mapClone[i][j].content) && mapClone[i][j].content.id===kId) requiredAmount--
						if(swapPlace!==1 && mapClone[i][j+1].state!=="Rearranging" && isPetal(mapClone[i][j+1].content) && mapClone[i][j+1].content.id===kId) requiredAmount--
						if(swapPlace!==2 && mapClone[i][j+2].state!=="Rearranging" && isPetal(mapClone[i][j+2].content) && mapClone[i][j+2].content.id===kId) requiredAmount--
						if(mapClone[swapEnd.x][swapEnd.y].state!=="Rearranging" && isPetal(mapClone[swapEnd.x][swapEnd.y].content) && mapClone[swapEnd.x][swapEnd.y].content.id===kId) requiredAmount--
						if(requiredAmount>availablePetalNum[k]) continue
						let newAdjust=new Object()
						newAdjust.adjustId=kId
						newAdjust.adjustPetal=new Array()
						newAdjust.adjustPetal[1]={x:i,y:j}
						newAdjust.adjustPetal[2]={x:i,y:j+1}
						newAdjust.adjustPetal[3]={x:i,y:j+2}
						newAdjust.adjustPetal[swapPlace+1]=swapEnd
						adjustList.push(newAdjust)
					}
				}
			}
			for(let i=1;i<=game.width-2;i++) for(let j=1;j<=game.height;j++) {
				if(mapClone[i][j].state==="Empty") continue
				if(mapClone[i+1][j].state==="Empty") continue
				if(mapClone[i+2][j].state==="Empty") continue
				if(mapClone[i][j].content.attribute.move==="Disabled") continue
				if(mapClone[i+1][j].content.attribute.move==="Disabled") continue
				if(mapClone[i+2][j].content.attribute.move==="Disabled") continue
				for(let k in availablePetalNum) {
					for(let swapPlace=0;swapPlace<=2;swapPlace++) for(let swapDir=1;swapDir<=4;swapDir++) {
						let swapStart={x:i+swapPlace,y:j},swapEnd={x:i+swapPlace+dx[swapDir],y:j+dy[swapDir]},kId=parseInt(k)
						if(swapEnd.x<1 || swapEnd.x>game.width || swapEnd.y<1 || swapEnd.y>game.height) continue
						if(game.wall[i+swapPlace][j][swapDir]>0) continue
						if(swapEnd.y===j && swapEnd.x>=i && swapEnd.x<=i+2) continue
						if(swapPlace!==0 && mapClone[i][j].state!=="Rearranging" && (!isPetal(mapClone[i][j].content) || mapClone[i][j].content.id!==kId)) continue
						if(swapPlace!==1 && mapClone[i+1][j].state!=="Rearranging" && (!isPetal(mapClone[i+1][j].content) || mapClone[i+1][j].content.id!==kId)) continue
						if(swapPlace!==2 && mapClone[i+2][j].state!=="Rearranging" && (!isPetal(mapClone[i+2][j].content) || mapClone[i+2][j].content.id!==kId)) continue
						if(mapClone[swapEnd.x][swapEnd.y].state!=="Rearranging" && (!isPetal(mapClone[swapEnd.x][swapEnd.y].content) || mapClone[swapEnd.x][swapEnd.y].content.id!==kId)) continue
						if(mapClone[swapStart.x][swapStart.y].state!=="Rearranging" && mapClone[swapStart.x][swapStart.y].state!=="Existing") continue
						if(mapClone[swapEnd.x][swapEnd.y].state!=="Rearranging" && mapClone[swapEnd.x][swapEnd.y].state!=="Existing") continue
						if(mapClone[swapStart.x][swapStart.y].state==="Existing" && isPetal(mapClone[swapStart.x][swapStart.y].content) && mapClone[swapStart.x][swapStart.y].content.id===kId) continue
						let requiredAmount=3
						if(swapPlace!==0 && mapClone[i][j].state!=="Rearranging" && isPetal(mapClone[i][j].content) && mapClone[i][j].content.id===kId) requiredAmount--
						if(swapPlace!==1 && mapClone[i+1][j].state!=="Rearranging" && isPetal(mapClone[i+1][j].content) && mapClone[i+1][j].content.id===kId) requiredAmount--
						if(swapPlace!==2 && mapClone[i+2][j].state!=="Rearranging" && isPetal(mapClone[i+2][j].content) && mapClone[i+2][j].content.id===kId) requiredAmount--
						if(mapClone[swapEnd.x][swapEnd.y].state!=="Rearranging" && isPetal(mapClone[swapEnd.x][swapEnd.y].content) && mapClone[swapEnd.x][swapEnd.y].content.id===kId) requiredAmount--
						if(requiredAmount>availablePetalNum[k]) continue
						let newAdjust=new Object()
						newAdjust.adjustId=kId
						newAdjust.adjustPetal=new Array()
						newAdjust.adjustPetal[1]={x:i,y:j}
						newAdjust.adjustPetal[2]={x:i+1,y:j}
						newAdjust.adjustPetal[3]={x:i+2,y:j}
						newAdjust.adjustPetal[swapPlace+1]=swapEnd
						adjustList.push(newAdjust)
					}
				}
			}
			while(adjustList.length>0) {
				let newAdjust=adjustList.splice(roll(0,adjustList.length-1),1)[0]
				let indexArray=new Array(),indexArrayMatch=new Array()
				for(let i=0;i<availablePetal.length;i++) {
					indexArray.push(i)
					if(availablePetal[i].content.id===newAdjust.adjustId) indexArrayMatch.push(i)
				}
				for(let i=1;i<=3;i++) if(mapClone[newAdjust.adjustPetal[i].x][newAdjust.adjustPetal[i].y].state==="Rearranging") {
					let matchRearrange=indexArrayMatch.splice(roll(0,indexArrayMatch.length-1),1)[0]
					indexArray.splice(indexArray.indexOf(matchRearrange),1)
					mapClone[newAdjust.adjustPetal[i].x][newAdjust.adjustPetal[i].y]=availablePetal[matchRearrange].clone(newAdjust.adjustPetal[i].x,newAdjust.adjustPetal[i].y)
					mapClone[newAdjust.adjustPetal[i].x][newAdjust.adjustPetal[i].y].state="Rearranged"
				}
				for(let i=1;i<=game.width;i++) for(let j=1;j<=game.height;j++) if(mapClone[i][j].state==="Rearranging") {
					let normalRearrange=indexArray.splice(roll(0,indexArray.length-1),1)[0]
					mapClone[i][j]=availablePetal[normalRearrange].clone(i,j)
				}
				let crushArray=new Array(),fixFlag=true
				for(let i=1;i<=game.width;i++) for(let j=1;j<=game.height-2;j++) if(isPetal(mapClone[i][j].content) && isPetal(mapClone[i][j+1].content) && isPetal(mapClone[i][j+2].content) && mapClone[i][j].content.id===mapClone[i][j+1].content.id && mapClone[i][j].content.id===mapClone[i][j+2].content.id) crushArray.push([{x:i,y:j},{x:i,y:j+1},{x:i,y:j+2}])
				for(let i=1;i<=game.width-2;i++) for(let j=1;j<=game.height;j++) if(isPetal(mapClone[i][j].content) && isPetal(mapClone[i+1][j].content) && isPetal(mapClone[i+2][j].content) && mapClone[i][j].content.id===mapClone[i+1][j].content.id && mapClone[i][j].content.id===mapClone[i+2][j].content.id) crushArray.push([{x:i,y:j},{x:i+1,y:j},{x:i+2,y:j}])
				while(crushArray.length>0 && fixFlag) {
					fixFlag=false
					let fixingCrush=crushArray.splice(roll(0,crushArray.length-1),1)[0]
					while(fixingCrush.length>0 && !fixFlag) {
						let specifiedFix=fixingCrush.splice(roll(0,fixingCrush.length-1),1)[0]
						let fixableArray=new Array()
						for(let i=1;i<=game.width;i++) for(let j=1;j<=game.height;j++) if(crushFixCheck({x:specifiedFix.x,y:specifiedFix.y},{x:i,y:j})) fixableArray.push({x:i,y:j})
						if(fixableArray.length>0) {
							fixFlag=true
							let fixer=fixableArray[roll(0,fixableArray.length-1)]
							let tempGrid=mapClone[fixer.x][fixer.y].clone()
							mapClone[fixer.x][fixer.y]=mapClone[specifiedFix.x][specifiedFix.y].clone(fixer.x,fixer.y)
							mapClone[specifiedFix.x][specifiedFix.y]=tempGrid.clone(specifiedFix.x,specifiedFix.y)
						}
					}
					crushArray=new Array()
					for(let i=1;i<=game.width;i++) for(let j=1;j<=game.height-2;j++) if(isPetal(mapClone[i][j].content) && isPetal(mapClone[i][j+1].content) && isPetal(mapClone[i][j+2].content) && mapClone[i][j].content.id===mapClone[i][j+1].content.id && mapClone[i][j].content.id===mapClone[i][j+2].content.id) crushArray.push([{x:i,y:j},{x:i,y:j+1},{x:i,y:j+2}])
					for(let i=1;i<=game.width-2;i++) for(let j=1;j<=game.height;j++) if(isPetal(mapClone[i][j].content) && isPetal(mapClone[i+1][j].content) && isPetal(mapClone[i+2][j].content) && mapClone[i][j].content.id===mapClone[i+1][j].content.id && mapClone[i][j].content.id===mapClone[i+2][j].content.id) crushArray.push([{x:i,y:j},{x:i+1,y:j},{x:i+2,y:j}])
				}
				for(let i=1;i<=3;i++) if(mapClone[newAdjust.adjustPetal[i].x][newAdjust.adjustPetal[i].y].state==="Rearranged") {
					mapClone[newAdjust.adjustPetal[i].x][newAdjust.adjustPetal[i].y].state="Rearranging"
				}
				if(fixFlag===true) {
					mapRearranged=true
					return true
				}
			}
			return false
		}
